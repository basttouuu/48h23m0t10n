<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps : YOLO en Prod</title>
    <link rel="stylesheet" href="../assets/css/qcm-devops.css">
    <script src="../src/qcm-devops.js" defer></script>
</head>
<body>
    <header>
        <h1>DevOps : YOLO en Prod </h1>
        <p>Le seul QCM où la pire pratique est toujours la bonne réponse.</p>
    </header>
    <main>
        <form id="qcm-form">
            
        <div class="question">
            <h3>Question 1. Que veut dire 'DevOps' ?</h3>
            <label><input type="radio" name="q0" value="0"> A. Développement + Opérations</label><br><label><input type="radio" name="q0" value="1"> B. Déployer En Vitesse, Oublier les Problèmes Suivants</label><br><label><input type="radio" name="q0" value="2"> C. L'art d'utiliser Docker sans comprendre Docker</label><br>
        </div>
    
        <div class="question">
            <h3>Question 2. Un fichier est refusé niveau droits. La solution :</h3>
            <label><input type="radio" name="q1" value="0"> A. Etudier le chown / chmod adéquat</label><br><label><input type="radio" name="q1" value="1"> B. chmod -R 777 / (Portes ouvertes pour tout le monde !)</label><br><label><input type="radio" name="q1" value="2"> C. Pleurer</label><br>
        </div>
    
        <div class="question">
            <h3>Question 3. Un conteneur plante en boucle :</h3>
            <label><input type="radio" name="q2" value="0"> A. Je lis les logs</label><br><label><input type="radio" name="q2" value="1"> B. 'restart: always' et je pars en pause café</label><br><label><input type="radio" name="q2" value="2"> C. J'accuse l'infra gérée par un autre</label><br>
        </div>
    
            <button type="button" id="valider-btn">Valider mon incompétence</button>
        </form>
        <div id="result" class="hidden"></div>
    </main>
    <footer>
        <p>Challenge 48h</p>
    </footer>
</body>
</html>
