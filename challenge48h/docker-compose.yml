version: '3.8'

services:
  backend:
    image: node:20-alpine
    container_name: challenge48h-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "3001:3001"
    env_file:
      # Charge le fichier .env du backend s'il existe (pour DATABASE_URL etc.)
      - ./backend/.env
    command: sh -c "npm install && npm start"

  frontend:
    image: node:20-alpine
    container_name: challenge48h-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true # Pour le rechargement à chaud (hot-reload) sous Docker
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
