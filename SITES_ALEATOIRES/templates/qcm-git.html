<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git : La Roulette Russe</title>
    <link rel="stylesheet" href="../assets/css/qcm-git.css">
    <script src="../src/qcm-git.js" defer></script>
</head>
<body>
    <header>
        <h1>Git : La Roulette Russe </h1>
        <p>Le seul QCM où la pire pratique est toujours la bonne réponse.</p>
    </header>
    <main>
        <form id="qcm-form">
            
        <div class="question">
            <h3>Question 1. À quoi sert la commande 'git push --force' ?</h3>
            <label><input type="radio" name="q0" value="0"> A. À imposer le respect et la terreur à ses collègues</label><br><label><input type="radio" name="q0" value="1"> B. À synchroniser prudemment ses branches</label><br><label><input type="radio" name="q0" value="2"> C. À nettoyer l'historique de l'entreprise (et détruire le travail des autres)</label><br>
        </div>
    
        <div class="question">
            <h3>Question 2. Que faire en cas de très gros conflit de fusion (merge conflict) ?</h3>
            <label><input type="radio" name="q1" value="0"> A. Résoudre chaque fichier patiemment avec un diff tool</label><br><label><input type="radio" name="q1" value="1"> B. Supprimer le dossier du projet et tout re-cloner de zéro</label><br><label><input type="radio" name="q1" value="2"> C. Payer un stagiaire pour le faire</label><br>
        </div>
    
        <div class="question">
            <h3>Question 3. Quel est le meilleur nom de commit ?</h3>
            <label><input type="radio" name="q2" value="0"> A. 'Fix: resolution bug bouton retour'</label><br><label><input type="radio" name="q2" value="1"> B. 'WIP'</label><br><label><input type="radio" name="q2" value="2"> C. 'ASUFDHIUSDHI VAZY CA MARCHE'</label><br>
        </div>
    
            <button type="button" id="valider-btn">Valider mon incompétence</button>
        </form>
        <div id="result" class="hidden"></div>
    </main>
    <footer>
        <p>Challenge 48h</p>
    </footer>
</body>
</html>
